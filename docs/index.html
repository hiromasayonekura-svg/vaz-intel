<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAZ Intel Platform | 競合インテリジェンス</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-subtle: #f7f7f5;
    --border: #e5e5e3;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --score-hot: #dc2626;
    --score-warm: #ea580c;
    --score-cool: #6b7280;
  }
  body {
    font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .nav-tab {
    @apply px-4 py-2 text-sm font-medium text-gray-600 rounded-lg transition cursor-pointer;
  }
  .nav-tab:hover {
    @apply bg-gray-100 text-gray-900;
  }
  .nav-tab.active {
    @apply bg-gray-900 text-white;
  }
  .card {
    @apply bg-white border border-gray-200 rounded-xl p-6 transition;
  }
  .card-hover {
    @apply hover:border-gray-300 hover:shadow-sm cursor-pointer;
  }
  .tag {
    @apply inline-block px-2.5 py-1 text-xs font-medium bg-gray-100 text-gray-700 rounded-md;
  }
  .score-badge {
    @apply inline-flex items-center px-3 py-1 text-sm font-semibold rounded-full;
  }
  .score-hot   { background: #fee2e2; color: #991b1b; }
  .score-warm  { background: #ffedd5; color: #9a3412; }
  .score-cool  { background: #f3f4f6; color: #4b5563; }
  .modal-bg {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
  }
  /* スクロールバー */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  /* アニメーション */
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* タイムラインの縦線 */
  .timeline-line {
    position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: #e5e5e3;
  }
</style>
</head>
<body class="min-h-screen">

<!-- ヘッダー -->
<header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gray-900 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold">V</span>
      </div>
      <div>
        <h1 class="text-lg font-semibold">VAZ Intel</h1>
        <p class="text-xs text-gray-500">競合インテリジェンス・ダッシュボード</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-xs text-gray-500" id="last-updated">読み込み中...</div>
      <button onclick="reloadData()" class="px-3 py-1.5 text-xs font-medium border border-gray-200 rounded-lg hover:bg-gray-50">
        🔄 更新
      </button>
    </div>
  </div>
  <!-- ナビゲーション -->
  <nav class="max-w-7xl mx-auto px-6 pb-3 flex items-center gap-1 overflow-x-auto">
    <button class="nav-tab active" data-view="home">🏠 ホーム</button>
    <button class="nav-tab" data-view="company">🏢 企業別カルテ</button>
    <button class="nav-tab" data-view="topic">🏷️ トピック別</button>
    <button class="nav-tab" data-view="timeline">📅 タイムライン</button>
    <button class="nav-tab" data-view="ranking">🏆 スコアランキング</button>
    <button class="nav-tab" data-view="search">🔍 検索</button>
    <button class="nav-tab" data-view="agenda">💡 アジェンダボード</button>
  </nav>
</header>

<!-- メインコンテンツ -->
<main class="max-w-7xl mx-auto px-6 py-8">
  <div id="view-container"></div>
</main>

<!-- 詳細モーダル -->
<div id="modal" class="fixed inset-0 z-50 hidden modal-bg flex items-start justify-center p-4 overflow-y-auto" onclick="closeModal(event)">
  <div class="bg-white rounded-2xl max-w-3xl w-full my-8 fade-in" onclick="event.stopPropagation()">
    <div id="modal-body" class="p-8"></div>
  </div>
</div>

<script>
/* ============================================================
   データ読み込み
   ============================================================ */
let DATA = null;
let CURRENT_VIEW = 'home';

async function loadData() {
  try {
    const res = await fetch('./data.json?_=' + Date.now());
    DATA = await res.json();
    document.getElementById('last-updated').textContent =
      `最終更新: ${DATA.meta.generatedAtJst}`;
    renderView(CURRENT_VIEW);
  } catch (e) {
    document.getElementById('view-container').innerHTML = `
      <div class="card text-center py-12">
        <div class="text-4xl mb-4">⚠️</div>
        <p class="text-gray-600">data.json を読み込めませんでした</p>
        <p class="text-xs text-gray-400 mt-2">${e.message}</p>
      </div>`;
  }
}

function reloadData() { loadData(); }

/* ============================================================
   ビュー切替
   ============================================================ */
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    CURRENT_VIEW = tab.dataset.view;
    renderView(CURRENT_VIEW);
  });
});

function renderView(view) {
  const container = document.getElementById('view-container');
  container.innerHTML = '';
  container.classList.remove('fade-in');
  void container.offsetWidth; // reflow
  container.classList.add('fade-in');

  if (!DATA) return;
  switch (view) {
    case 'home':     renderHome(container); break;
    case 'company':  renderCompany(container); break;
    case 'topic':    renderTopic(container); break;
    case 'timeline': renderTimeline(container); break;
    case 'ranking':  renderRanking(container); break;
    case 'search':   renderSearch(container); break;
    case 'agenda':   renderAgenda(container); break;
  }
}

/* ============================================================
   🏠 ホーム
   ============================================================ */
function renderHome(c) {
  const h = DATA.home;
  c.innerHTML = `
    <!-- 月ラベル -->
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">${escapeHtml(h.monthLabel)} 競合動向</h2>
      <p class="text-gray-500 mt-1">先月のハイライト・業界動向・経営アジェンダを一望できます</p>
    </div>

    <!-- KPI -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      ${kpiCard('今月のニュース', h.thisMonthNewsCount, '件')}
      ${kpiCard('重要分析レポート', h.thisMonthAnalysisCount, '件')}
      ${kpiCard('注目タグ数', h.topTags.length, 'タグ')}
    </div>

    <!-- ハイライト -->
    <section class="mb-10">
      <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <span>🔥</span> 今月のハイライト
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        ${h.highlights.length === 0
          ? `<div class="card text-gray-400 col-span-3 text-center py-8">今月の重要分析はまだありません</div>`
          : h.highlights.map(a => highlightCard(a)).join('')}
      </div>
    </section>

    <!-- 業界動向サマリー -->
    <section class="mb-10 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="card md:col-span-2">
        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <span>📊</span> 業界キーワード TOP10
        </h3>
        <canvas id="tagChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <span>🏆</span> 競合警戒度ランキング
        </h3>
        <div class="space-y-2">
          ${h.ranking.slice(0, 7).map((r, i) => rankingRow(r, i)).join('')}
        </div>
      </div>
    </section>

    <!-- 経営アジェンダ -->
    <section class="mb-10">
      <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <span>💡</span> 今月の経営アジェンダ
      </h3>
      <div class="space-y-3">
        ${h.highlights.length === 0
          ? `<div class="card text-gray-400 text-center py-8">アジェンダはありません</div>`
          : h.highlights.map(a => agendaRow(a)).join('')}
      </div>
    </section>
  `;
  // チャート描画
  if (h.topTags.length > 0) drawTagChart(h.topTags);
}

function kpiCard(label, value, unit) {
  return `
    <div class="card">
      <div class="text-xs text-gray-500 mb-1">${label}</div>
      <div class="text-3xl font-bold">${value}<span class="text-base font-normal text-gray-400 ml-1">${unit}</span></div>
    </div>`;
}

function highlightCard(a) {
  return `
    <div class="card card-hover" onclick='showDetail(${JSON.stringify(a.id)})'>
      <div class="flex items-start justify-between mb-3">
        <span class="text-xs text-gray-500">${escapeHtml(a.date)}</span>
        ${scoreBadge(a.totalScore)}
      </div>
      <div class="text-xs text-gray-500 mb-2">${escapeHtml(a.company)}</div>
      <h4 class="font-semibold text-sm leading-snug mb-3 line-clamp-3">${escapeHtml(a.title)}</h4>
      <div class="flex flex-wrap gap-1">
        ${a.tags.slice(0, 3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
      </div>
    </div>`;
}

function rankingRow(r, idx) {
  const medal = ['🥇', '🥈', '🥉'][idx] || ` ${idx + 1}`;
  return `
    <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
      <div class="flex items-center gap-3">
        <span class="text-sm w-6">${medal}</span>
        <span class="text-sm font-medium">${escapeHtml(r.company)}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">${r.count}件</span>
        <span class="text-sm font-semibold">${r.totalScore.toFixed(1)}</span>
      </div>
    </div>`;
}

function agendaRow(a) {
  return `
    <div class="card card-hover" onclick='showDetail(${JSON.stringify(a.id)})'>
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 mt-1">${scoreBadge(a.totalScore)}</div>
        <div class="flex-1">
          <div class="text-xs text-gray-500 mb-1">${escapeHtml(a.company)} ・ ${escapeHtml(a.date)}</div>
          <p class="text-sm font-medium leading-relaxed">${escapeHtml(a.agenda || '（アジェンダ未生成）')}</p>
        </div>
      </div>
    </div>`;
}

function drawTagChart(tags) {
  const ctx = document.getElementById('tagChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: tags.map(t => t.tag.replace(/^#/, '')),
      datasets: [{
        data: tags.map(t => t.count),
        backgroundColor: '#1a1a1a',
        borderRadius: 4,
        barThickness: 14
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f3f4f6' } },
        y: { grid: { display: false } }
      }
    }
  });
}

/* ============================================================
   🏢 企業別カルテ
   ============================================================ */
function renderCompany(c) {
  const companies = DATA.competitors.map(co => {
    const analyses = DATA.analyses.filter(a => a.company === co.name);
    const news     = DATA.news.filter(n => n.company === co.name);
    const totalScore = analyses.reduce((s, a) => s + a.totalScore, 0);
    return { ...co, analyses, news, totalScore };
  }).sort((a, b) => b.totalScore - a.totalScore);

  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">企業別カルテ</h2>
      <p class="text-gray-500 mt-1">競合7社の動向を1社ずつ詳しく確認できます</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      ${companies.map(co => companyCard(co)).join('')}
    </div>`;
}

function companyCard(co) {
  return `
    <div class="card">
      <div class="flex items-start justify-between mb-4">
        <h3 class="text-lg font-semibold">${escapeHtml(co.name)}</h3>
        ${co.totalScore > 0 ? `<span class="score-badge score-${scoreColor(co.totalScore)}">累積 ${co.totalScore.toFixed(1)}</span>` : ''}
      </div>
      <div class="flex gap-4 text-xs text-gray-500 mb-4">
        <span>📰 ニュース ${co.news.length}件</span>
        <span>📊 分析 ${co.analyses.length}件</span>
      </div>
      ${co.analyses.length === 0
        ? `<p class="text-sm text-gray-400">分析レポートはまだありません</p>`
        : `<div class="space-y-2">
            ${co.analyses.slice(0, 3).map(a => `
              <div class="text-sm border-l-2 border-gray-200 pl-3 py-1 hover:border-gray-900 cursor-pointer" onclick='showDetail(${JSON.stringify(a.id)})'>
                <div class="text-xs text-gray-400">${escapeHtml(a.date)}</div>
                <div class="line-clamp-2">${escapeHtml(a.title)}</div>
              </div>`).join('')}
          </div>`}
    </div>`;
}

/* ============================================================
   🏷️ トピック別
   ============================================================ */
function renderTopic(c) {
  // 全タグを集計
  const tagMap = {};
  DATA.analyses.forEach(a => {
    a.tags.forEach(t => {
      if (!tagMap[t]) tagMap[t] = [];
      tagMap[t].push(a);
    });
  });
  const sorted = Object.entries(tagMap)
    .sort((a, b) => b[1].length - a[1].length);

  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">トピック別ビュー</h2>
      <p class="text-gray-500 mt-1">タグで横断的に競合動向を確認できます</p>
    </div>
    <div class="space-y-6">
      ${sorted.map(([tag, items]) => `
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">${escapeHtml(tag)}</h3>
            <span class="text-xs text-gray-400">${items.length}件</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${items.map(a => `
              <div class="border border-gray-100 rounded-lg p-3 hover:bg-gray-50 cursor-pointer" onclick='showDetail(${JSON.stringify(a.id)})'>
                <div class="flex items-center justify-between mb-1">
                  <span class="text-xs text-gray-500">${escapeHtml(a.company)}</span>
                  ${scoreBadge(a.totalScore)}
                </div>
                <p class="text-sm line-clamp-2">${escapeHtml(a.title)}</p>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

/* ============================================================
   📅 タイムライン
   ============================================================ */
function renderTimeline(c) {
  const sorted = [...DATA.analyses].sort((a, b) => b.date.localeCompare(a.date));
  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">タイムライン</h2>
      <p class="text-gray-500 mt-1">時系列で全競合の動きを俯瞰できます</p>
    </div>
    <div class="relative pl-8">
      <div class="timeline-line"></div>
      ${sorted.map(a => `
        <div class="relative mb-6">
          <div class="absolute -left-7 top-2 w-4 h-4 bg-gray-900 rounded-full border-4 border-white"></div>
          <div class="card card-hover" onclick='showDetail(${JSON.stringify(a.id)})'>
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500">${escapeHtml(a.date)}</span>
                <span class="text-xs font-medium">${escapeHtml(a.company)}</span>
              </div>
              ${scoreBadge(a.totalScore)}
            </div>
            <h4 class="font-semibold text-sm mb-2">${escapeHtml(a.title)}</h4>
            <p class="text-xs text-gray-600 line-clamp-2">${escapeHtml(a.fact)}</p>
          </div>
        </div>`).join('')}
    </div>`;
}

/* ============================================================
   🏆 スコアランキング
   ============================================================ */
function renderRanking(c) {
  const ranking = DATA.home.ranking;
  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">競合警戒度ランキング</h2>
      <p class="text-gray-500 mt-1">累積スコアで競合を順位づけします</p>
    </div>
    <div class="card">
      <table class="w-full">
        <thead class="border-b border-gray-200">
          <tr class="text-left text-xs text-gray-500 uppercase tracking-wide">
            <th class="py-3 px-2">順位</th>
            <th class="py-3 px-2">企業名</th>
            <th class="py-3 px-2 text-right">分析件数</th>
            <th class="py-3 px-2 text-right">累積スコア</th>
            <th class="py-3 px-2 text-right">平均スコア</th>
          </tr>
        </thead>
        <tbody>
          ${ranking.map((r, i) => `
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="py-3 px-2 font-semibold">${['🥇', '🥈', '🥉'][i] || (i + 1)}</td>
              <td class="py-3 px-2 font-medium">${escapeHtml(r.company)}</td>
              <td class="py-3 px-2 text-right text-gray-600">${r.count}</td>
              <td class="py-3 px-2 text-right font-semibold">${r.totalScore.toFixed(2)}</td>
              <td class="py-3 px-2 text-right text-gray-600">${(r.totalScore / r.count).toFixed(2)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

/* ============================================================
   🔍 検索
   ============================================================ */
function renderSearch(c) {
  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">検索</h2>
      <p class="text-gray-500 mt-1">企業名・タイトル・本文を横断検索できます</p>
    </div>
    <div class="card mb-4">
      <input id="search-input" type="text" placeholder="キーワードを入力..." class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-gray-900">
    </div>
    <div id="search-results" class="space-y-3"></div>`;

  const input = document.getElementById('search-input');
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    const results = document.getElementById('search-results');
    if (!q) { results.innerHTML = ''; return; }
    const hits = DATA.analyses.filter(a =>
      a.company.toLowerCase().includes(q) ||
      a.title.toLowerCase().includes(q) ||
      (a.fact && a.fact.toLowerCase().includes(q)) ||
      (a.intent && a.intent.toLowerCase().includes(q)) ||
      a.tags.some(t => t.toLowerCase().includes(q))
    );
    results.innerHTML = hits.length === 0
      ? `<div class="card text-center text-gray-400 py-8">該当する分析は見つかりませんでした</div>`
      : hits.map(a => `
        <div class="card card-hover" onclick='showDetail(${JSON.stringify(a.id)})'>
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs text-gray-500">${escapeHtml(a.company)} ・ ${escapeHtml(a.date)}</span>
            ${scoreBadge(a.totalScore)}
          </div>
          <h4 class="font-semibold text-sm mb-2">${escapeHtml(a.title)}</h4>
          <p class="text-xs text-gray-600 line-clamp-2">${escapeHtml(a.fact)}</p>
        </div>`).join('');
  });
  input.focus();
}

/* ============================================================
   💡 アジェンダボード
   ============================================================ */
function renderAgenda(c) {
  const sorted = [...DATA.analyses].sort((a, b) => b.totalScore - a.totalScore);
  c.innerHTML = `
    <div class="mb-8">
      <h2 class="text-3xl font-bold tracking-tight">経営アジェンダ・ボード</h2>
      <p class="text-gray-500 mt-1">経営陣への問いかけを一覧で議論できます</p>
    </div>
    <div class="space-y-4">
      ${sorted.map(a => `
        <div class="card">
          <div class="flex items-start justify-between mb-3">
            <div>
              <div class="text-xs text-gray-500">${escapeHtml(a.company)} ・ ${escapeHtml(a.date)}</div>
              <h4 class="font-semibold text-sm mt-1">${escapeHtml(a.title)}</h4>
            </div>
            ${scoreBadge(a.totalScore)}
          </div>
          <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
            <div class="text-xs font-semibold text-blue-700 mb-1">経営陣への問い</div>
            <p class="text-sm leading-relaxed">${escapeHtml(a.agenda)}</p>
          </div>
          <button class="mt-3 text-xs text-gray-500 hover:text-gray-900" onclick='showDetail(${JSON.stringify(a.id)})'>
            ▸ 詳細を見る
          </button>
        </div>`).join('')}
    </div>`;
}

/* ============================================================
   詳細モーダル
   ============================================================ */
function showDetail(id) {
  const a = DATA.analyses.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="flex items-start justify-between mb-6">
      <div>
        <div class="text-xs text-gray-500 mb-1">${escapeHtml(a.company)} ・ ${escapeHtml(a.date)}</div>
        <h3 class="text-xl font-bold leading-snug">${escapeHtml(a.title)}</h3>
      </div>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-900 text-2xl">×</button>
    </div>
    <div class="flex items-center gap-3 mb-6">
      ${scoreBadge(a.totalScore)}
      ${a.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
    </div>
    ${section('📌 客観的ファクト（レイヤー1）', a.fact)}
    ${section('🔍 背景・競合の意図', a.intent)}
    ${section('💥 自社・業界への影響（レイヤー2）', a.impact)}
    ${section('💡 経営陣への問いかけ（レイヤー3）', a.agenda, true)}
    <div class="mt-6 pt-6 border-t border-gray-100">
      <a href="${escapeHtml(a.url)}" target="_blank" rel="noopener" class="text-xs text-gray-500 hover:text-gray-900">
        🔗 元記事を開く
      </a>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

function section(title, body, highlight = false) {
  const cls = highlight ? 'bg-blue-50 border-l-4 border-blue-500' : 'bg-gray-50';
  return `
    <div class="${cls} p-4 rounded-lg mb-4">
      <div class="text-xs font-semibold text-gray-700 mb-2">${title}</div>
      <p class="text-sm leading-relaxed">${escapeHtml(body || '（未生成）')}</p>
    </div>`;
}

function closeModal(e) {
  if (e && e.target.id !== 'modal') return;
  document.getElementById('modal').classList.add('hidden');
}

/* ============================================================
   ユーティリティ
   ============================================================ */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function scoreBadge(score) {
  return `<span class="score-badge score-${scoreColor(score)}">${score.toFixed(1)}</span>`;
}

function scoreColor(score) {
  if (score >= 15) return 'hot';
  if (score >= 10) return 'warm';
  return 'cool';
}

// 初期表示
loadData();
</script>
</body>
